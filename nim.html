<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai Cuối Cùng Người Đó Chết</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* Đổi sang font Be Vietnam Pro để khắc phục hoàn toàn lỗi font tiếng Việt */
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap');
        
        :root {
            --blue: #3b82f6; 
            --red: #ef4444; 
            --gold: #f59e0b; 
            --gold-light: #fbbf24;
            --green: #10b981; 
            --dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.5); 
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; }

        body {
            font-family: 'Be Vietnam Pro', sans-serif; 
            background-color: var(--dark);
            color: #f8fafc; 
            margin: 0; 
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 15px 20px 15px; 
            overflow-x: hidden;
            position: relative;
        }

        /* --- BACKGROUND EFFECTS --- */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 50vw;
            height: 50vw;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.12) 0%, rgba(15, 23, 42, 0) 70%);
            z-index: -1;
            animation: floating 10s infinite ease-in-out alternate;
        }
        body::after {
            background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, rgba(15, 23, 42, 0) 70%);
            top: auto;
            bottom: -10%;
            left: -10%;
            animation-delay: -5s;
        }
        @keyframes floating {
            0% { transform: translate(0, 0); }
            100% { transform: translate(10%, 15%); }
        }
        
        .back-home {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: var(--glass-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 50px;
            color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 700;
            transition: all 0.3s ease; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .back-home:hover { 
            color: white; border-color: var(--gold); 
            transform: translateX(5px); box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
            background: rgba(30, 41, 59, 0.8);
        }

        .glass {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            padding: 35px 25px; width: 100%; max-width: 500px; margin-top: 30px;
            animation: fadeInUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { 
            text-align: center; 
            margin-top: 0; margin-bottom: 15px; 
            font-size: 2rem;
            background: linear-gradient(to right, var(--gold-light), var(--gold), #ea580c);
            -webkit-background-clip: text; background-clip: text;
            color: transparent; text-transform: uppercase; letter-spacing: 2px;
            filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.3));
        }

        /* --- INPUTS --- */
        input {
            width: 100%; padding: 16px 25px; margin-bottom: 15px; 
            border-radius: 50px; border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.3); color: white; font-size: 15px; font-family: inherit;
            transition: all 0.3s ease; text-align: center;
        }
        input:focus { 
            outline: none; border-color: var(--gold); background: rgba(0,0,0,0.5);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); 
        }

        /* --- BUTTONS --- */
        button {
            width: 100%; padding: 16px 30px; border-radius: 50px; border: 2px solid transparent; 
            font-weight: 800; font-size: 14px; font-family: 'Be Vietnam Pro', sans-serif; letter-spacing: 1px;
            cursor: pointer; background: var(--blue); color: white; text-transform: uppercase; 
            margin-bottom: 12px; transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.2);
        }
        button:hover:not(:disabled) { 
            transform: translateY(-3px); box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4); filter: brightness(1.1);
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
        
        .btn-bot { background: #8b5cf6; box-shadow: 0 5px 15px rgba(139, 92, 246, 0.2); } 
        .btn-bot:hover:not(:disabled) { box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4); }
        
        .btn-gold { background: var(--gold); color: #000; box-shadow: 0 5px 15px rgba(245, 158, 11, 0.2); }
        .btn-gold:hover:not(:disabled) { box-shadow: 0 8px 25px rgba(245, 158, 11, 0.4); }

        /* --- GAME BOARD --- */
        .row { display: flex; justify-content: center; gap: 16px; margin: 20px 0; }
        .circle {
            width: 55px; height: 55px; background: rgba(30, 41, 59, 0.9); border: 2px solid #475569;
            border-radius: 50%; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .circle:hover:not(.dimmed) { transform: scale(1.05); border-color: #94a3b8; }
        .circle.selected { 
            background: var(--blue); border-color: white; 
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.8); transform: scale(1.15); 
        }
        
        .circle.dimmed { 
            opacity: 0.1; cursor: not-allowed; pointer-events: none; 
            background: transparent; border-color: #334155;
            box-shadow: none; transform: scale(0.85); 
        }

        .indicator {
            text-align: center; padding: 15px; border-radius: 15px; margin-bottom: 25px; font-weight: 800; font-size: 15px;
            background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2); letter-spacing: 1px;
        }
        
        .score-box { 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; 
            font-weight: bold; color: var(--gold); background: rgba(0,0,0,0.3); 
            padding: 15px 25px; border-radius: 16px; border: 1px solid var(--glass-border);
        }
        .player-name { display: block; font-size: 13px; color: #cbd5e1; text-transform: uppercase; margin-bottom: 5px; }
        .score-num { font-size: 28px; color: white; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        
        .fullscreen-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px);
            z-index: 1000; display: none; flex-direction: column; align-items: center; 
            justify-content: center; text-align: center; padding: 20px;
        }

        /* Tối ưu chống chèn ép trên Mobile */
        @media (max-width: 480px) {
            .circle {
                width: 38px; height: 38px; 
                border-width: 1px;
            }
            .row {
                gap: 8px; 
                margin: 15px 0;
            }
            .glass { padding: 25px 15px; }
            h1 { font-size: 1.6rem; }
            .score-num { font-size: 22px; }
            .score-box { padding: 15px; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">⬅ TRANG CHỦ</a>

    <div id="ready-overlay" class="fullscreen-overlay">
        <h2 style="color: var(--gold); font-size: 2rem; margin-bottom: 10px; text-shadow: 0 0 15px rgba(245,158,11,0.5);">ĐANG CHỜ ĐỐI THỦ...</h2>
        <p id="ready-status" style="color: var(--green); font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 15px rgba(16,185,129,0.5);">Sẵn sàng: 1/2</p>
    </div>

    <div id="randomizing-overlay" class="fullscreen-overlay">
        <div style="font-size: 60px; margin-bottom: 20px; animation: floating 2s infinite ease-in-out;">🪙</div>
        <h2 id="random-msg" style="color: var(--gold); font-size: 2rem; margin-bottom: 10px; text-shadow: 0 0 15px rgba(245,158,11,0.5);">Đang tung đồng xu...</h2>
        <p id="random-sub" style="color: #cbd5e1; font-size: 1.2rem;">Ai sẽ đi trước đây?</p>
    </div>

    <div id="lobby" class="glass">
        <h1>AI CUỐI CÙNG<br>NGƯỜI ĐÓ CHẾT</h1>
        <p style="text-align: center; font-size: 14px; color: #94a3b8; margin-bottom: 25px; line-height: 1.5;">Kẻ lấy viên cuối cùng là kẻ thua cuộc.<br>Hãy tính toán cẩn thận!</p>
        
        <input type="text" id="my-name-input" placeholder="Bắt buộc nhập tên (Vd: Faker, Chovy...)" maxlength="15">

        <div style="background: rgba(0,0,0,0.4); padding: 20px; border-radius: 16px; border: 1px dashed var(--gold); text-align: center; margin-bottom: 25px; box-shadow: inset 0 0 20px rgba(245, 158, 11, 0.1);">
            <small style="color: #94a3b8; font-weight: 600; text-transform: uppercase;">Mã Phòng Của Bạn:</small>
            <div id="my-id" style="font-size: 24px; font-weight: 800; color: var(--red); letter-spacing: 2px; margin-top: 5px; text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);">...</div>
        </div>
        
        <input type="text" id="peer-id-input" placeholder="Nhập ID phòng đối thủ để tham gia">
        <button onclick="connectToPeer()">BẮT ĐẦU THÁCH ĐẤU ONLINE</button>
        
        <div style="margin: 25px 0; border-top: 1px solid var(--glass-border); position: relative;">
            <span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--dark); padding: 0 15px; color: #94a3b8; font-size: 13px; font-weight: bold;">HOẶC</span>
        </div>
        
        <button class="btn-bot" onclick="startBotMode()">🤖 CHƠI VỚI MÁY (BOT THÔNG MINH)</button>

        <p id="status" style="text-align:center; font-size: 13px; color: var(--green); margin-top: 20px; font-weight: 600;">Đang khởi tạo máy chủ...</p>
    </div>

    <div id="game-view" class="glass" style="display:none;">
        <div class="score-box">
            <div style="text-align: left;">
                <span class="player-name" id="name-you">BẠN</span>
                <span class="score-num" id="s-you">0</span>
            </div>
            <div style="font-size: 24px; color: #475569; font-weight: 800;">-</div>
            <div style="text-align: right;">
                <span class="player-name" id="name-opp">ĐỐI THỦ</span>
                <span class="score-num" id="s-opp">0</span>
            </div>
        </div>
        <div id="turn-txt" class="indicator">ĐANG CHỜ...</div>
        
        <div id="board" style="margin-bottom: 30px;"></div>
        
        <button id="btn-move" onclick="makeMove()" disabled style="background: var(--green);">CHỐT LƯỢT ĐI</button>
        <button id="btn-restart" onclick="requestRestart()" style="display:none; background: var(--gold); color:black;">VÁN MỚI (SẴN SÀNG)</button>
    </div>

    <script>
        // Đã cập nhật TURN Server để khắc phục lỗi không xuyên thủng được tường lửa mạng di động 4G/5G
        const peer = new Peer({
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:global.stun.twilio.com:3478' },
                    {
                        urls: "turn:openrelay.metered.ca:80",
                        username: "openrelayproject",
                        credential: "openrelayproject"
                    },
                    {
                        urls: "turn:openrelay.metered.ca:443",
                        username: "openrelayproject",
                        credential: "openrelayproject"
                    }
                ]
            }
        });
        
        let conn, myId;
        let isHost = false; 
        let isMyTurn = false;
        let isBotMode = false;
        
        let localReady = false;
        let remoteReady = false;

        let myName = "";
        let oppName = "Đối Thủ";

        const initialRows = [3, 4, 7];
        let boardState = []; 
        let selRow = null; 
        let selectedIndices = []; 
        let scores = {you: 0, opp: 0};

        peer.on('open', id => { 
            myId = id; 
            document.getElementById('my-id').innerText = id; 
            document.getElementById('status').innerText = "Máy chủ đã sẵn sàng!"; 
        });
        
        peer.on('connection', c => { 
            const inputName = document.getElementById('my-name-input').value.trim();
            if (!inputName) {
                alert("Ai đó đang cố kết nối nhưng bạn chưa nhập tên! Hãy nhập tên để có thể chơi.");
                return;
            }
            
            isHost = true; 
            conn = c; 
            isBotMode = false;
            saveMyName();
            setupConn(); 
            
            const startSequence = () => {
                const randomStarter = Math.random() < 0.5;
                conn.send({type: 'START_INFO', youStart: !randomStarter, hostName: myName, isRandom: true});
                startTurnSequence(randomStarter, oppName, true); 
            };

            if (conn.open) { setTimeout(startSequence, 500); } 
            else { conn.on('open', () => { setTimeout(startSequence, 500); }); }
        });

        function connectToPeer() {
            const inputName = document.getElementById('my-name-input').value.trim();
            const id = document.getElementById('peer-id-input').value.trim();
            
            if (!inputName) return alert("Vui lòng nhập tên của bạn trước khi bắt đầu!");
            if (!id) return alert("Vui lòng nhập Mã phòng của đối thủ!");
            
            isHost = false;
            saveMyName();
            conn = peer.connect(id, { reliable: true });
            isBotMode = false;
            setupConn();
            document.getElementById('status').innerText = "Đang kết nối vào phòng...";
        }

        function saveMyName() {
            myName = document.getElementById('my-name-input').value.trim();
        }

        function setupConn() {
            const sendUserInfo = () => { conn.send({type: 'USER_INFO', name: myName}); };
            if (conn.open) { sendUserInfo(); } else { conn.on('open', sendUserInfo); }

            conn.on('data', data => {
                if(data.type === 'USER_INFO') {
                    oppName = data.name;
                    document.getElementById('name-opp').innerText = oppName;
                }
                if(data.type === 'START_INFO') { 
                    oppName = data.hostName; 
                    document.getElementById('name-opp').innerText = oppName;
                    
                    localReady = false; remoteReady = false;
                    document.getElementById('ready-overlay').style.display = 'none';
                    resetGameUI();

                    startTurnSequence(data.youStart, oppName, data.isRandom); 
                }
                if(data.type === 'MOVE') { 
                    boardState = data.board; 
                    isMyTurn = true; 
                    render(); 
                    checkWin("OPP"); 
                }
                if(data.type === 'READY_UP') {
                    remoteReady = true;
                    checkBothReady();
                }
            });
            
            conn.on('close', () => {
                alert("Đối thủ đã ngắt kết nối!");
                window.location.reload();
            });
        }

        function startBotMode() {
            const inputName = document.getElementById('my-name-input').value.trim();
            if (!inputName) return alert("Vui lòng nhập tên của bạn trước khi chơi với máy!");
            
            saveMyName();
            isBotMode = true;
            oppName = "Bot Master 🤖";
            document.getElementById('name-opp').innerText = oppName;
            
            const randomStarter = Math.random() < 0.5;
            startTurnSequence(randomStarter, oppName, true); 
        }

        function executeBotTurn() {
            updateTurnText(false, true); 
            setTimeout(() => {
                let currentRows = boardState.map(row => row.filter(isActive => isActive).length);
                let move = getBestBotMove(currentRows);
                
                let taken = 0;
                for(let i = 0; i < boardState[move.row].length; i++) {
                    if (boardState[move.row][i] && taken < move.take) {
                        boardState[move.row][i] = false; 
                        taken++;
                    }
                }
                
                isMyTurn = true;
                render();
                checkWin("OPP");
            }, 1000 + Math.random() * 1000); 
        }

        function getBestBotMove(counts) {
            let nonOnes = counts.filter(x => x > 1).length;

            if (nonOnes === 1) {
                let ones = counts.filter(x => x === 1).length;
                let targetIndex = counts.findIndex(x => x > 1);
                let leaveAmount = (ones % 2 === 0) ? 1 : 0;
                let takeAmount = counts[targetIndex] - leaveAmount;
                return { row: targetIndex, take: takeAmount };
            }

            let nimSum = counts.reduce((a, b) => a ^ b, 0);
            if (nimSum !== 0) {
                for (let i = 0; i < counts.length; i++) {
                    let target = counts[i] ^ nimSum;
                    if (target < counts[i]) {
                        return { row: i, take: counts[i] - target };
                    }
                }
            }
            let available = counts.map((v, i) => ({v, i})).filter(x => x.v > 0);
            let randRow = available[Math.floor(Math.random() * available.length)];
            return { row: randRow.i, take: 1 };
        }

        // --- GIAO DIỆN & RANDOM LƯỢT ---
        function startTurnSequence(iStart, opponentName, isRandom) {
            const overlay = document.getElementById('randomizing-overlay');
            overlay.style.display = 'flex';
            document.getElementById('name-you').innerText = myName;
            document.getElementById('random-msg').style.color = "var(--gold)"; 

            document.getElementById('random-msg').innerText = "Đang tung đồng xu...";
            document.getElementById('random-sub').innerText = "Ai sẽ đi trước đây?";
            
            setTimeout(() => {
                document.getElementById('random-msg').innerText = iStart ? `${myName.toUpperCase()} ĐI TRƯỚC!` : `${opponentName.toUpperCase()} ĐI TRƯỚC!`;
                document.getElementById('random-msg').style.color = iStart ? "var(--green)" : "var(--red)";
                document.getElementById('random-sub').innerText = "";
                
                setTimeout(() => {
                    overlay.style.display = 'none';
                    isMyTurn = iStart;
                    startUI();
                    
                    if (isBotMode && !isMyTurn) executeBotTurn();
                }, 1500);
            }, 1500);
        }

        function startUI() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            resetGameUI();
        }

        function render() {
            const b = document.getElementById('board'); 
            b.innerHTML = '';
            
            boardState.forEach((rowArray, rIdx) => {
                const rDiv = document.createElement('div'); 
                rDiv.className = 'row';
                
                rowArray.forEach((isActive, cIdx) => {
                    const c = document.createElement('div'); 
                    
                    if (isActive) {
                        c.className = 'circle';
                        if (selRow === rIdx && selectedIndices.includes(cIdx)) {
                            c.classList.add('selected');
                        }
                        c.onclick = () => select(rIdx, cIdx);
                    } else {
                        c.className = 'circle dimmed'; 
                    }
                    
                    rDiv.appendChild(c);
                });
                
                b.appendChild(rDiv);
            });
            updateTurnText(isMyTurn, false);
        }

        function select(rIdx, cIdx) {
            if(!isMyTurn) return;
            
            if(selRow !== null && selRow !== rIdx) {
                selectedIndices = [];
            }
            selRow = rIdx;
            
            const pos = selectedIndices.indexOf(cIdx);
            if (pos > -1) {
                selectedIndices.splice(pos, 1);
            } else {
                selectedIndices.push(cIdx);
            }
            
            if(selectedIndices.length === 0) selRow = null;
            document.getElementById('btn-move').disabled = selectedIndices.length === 0;
            
            render(); 
        }

        function makeMove() {
            selectedIndices.forEach(cIdx => {
                boardState[selRow][cIdx] = false;
            });
            
            isMyTurn = false; 
            selRow = null; 
            selectedIndices = [];
            document.getElementById('btn-move').disabled = true;
            
            if (!isBotMode) conn.send({type: 'MOVE', board: boardState});
            render();
            
            if (!checkWin("YOU") && isBotMode) executeBotTurn();
        }

        function updateTurnText(isMe, isBotThinking = false) {
            const t = document.getElementById('turn-txt');
            if (isMe) {
                t.innerText = "🟢 LƯỢT CỦA BẠN";
                t.style.color = "var(--green)";
            } else {
                t.innerText = isBotThinking ? "🤖 BOT ĐANG TÍNH TOÁN..." : "⏳ ĐỐI THỦ ĐANG NGHĨ...";
                t.style.color = "#94a3b8";
            }
        }

        function checkWin(last) {
            const activeCount = boardState.flat().filter(isActive => isActive).length;
            
            if(activeCount === 0) {
                const winName = (last === "YOU" ? oppName : myName);
                const isYouWin = (winName === myName);
                
                if(isYouWin) scores.you++; else scores.opp++;
                document.getElementById('s-you').innerText = scores.you;
                document.getElementById('s-opp').innerText = scores.opp;
                
                document.getElementById('turn-txt').innerText = `🎉 ${winName.toUpperCase()} ĐÃ CHIẾN THẮNG!`;
                document.getElementById('turn-txt').style.color = isYouWin ? "var(--green)" : "var(--red)";
                
                document.getElementById('btn-restart').style.display = 'block';
                document.getElementById('btn-move').style.display = 'none';
                return true;
            }
            return false;
        }

        function requestRestart() { 
            if (isBotMode) {
                const overlay = document.getElementById('ready-overlay');
                const statusText = document.getElementById('ready-status');
                overlay.style.display = 'flex';
                statusText.innerText = "Sẵn sàng: 2/2\nBắt đầu!";
                statusText.style.color = "var(--green)";
                
                setTimeout(() => {
                    overlay.style.display = 'none';
                    resetGameUI();
                    
                    const randomStarter = Math.random() < 0.5;
                    startTurnSequence(randomStarter, oppName, true);
                }, 1000);
            } else {
                localReady = true;
                document.getElementById('btn-restart').style.display = 'none'; 
                conn.send({type: 'READY_UP'}); 
                checkBothReady();
            }
        }

        function checkBothReady() {
            const overlay = document.getElementById('ready-overlay');
            const statusText = document.getElementById('ready-status');

            if (localReady && !remoteReady) {
                overlay.style.display = 'flex';
                statusText.innerText = `Sẵn sàng: 1/2\n(Đang chờ ${oppName}...)`;
                statusText.style.color = "var(--gold)";
            } 
            else if (!localReady && remoteReady) {
                document.getElementById('turn-txt').innerText = `${oppName.toUpperCase()} MUỐN CHƠI LẠI (1/2)`;
                document.getElementById('turn-txt').style.color = "var(--gold)";
            } 
            else if (localReady && remoteReady) {
                overlay.style.display = 'flex';
                statusText.innerText = "Sẵn sàng: 2/2\nBắt đầu!";
                statusText.style.color = "var(--green)";

                setTimeout(() => {
                    overlay.style.display = 'none';
                    localReady = false;
                    remoteReady = false;
                    resetGameUI();

                    if (isHost) {
                        const randomStarter = Math.random() < 0.5;
                        conn.send({type: 'START_INFO', youStart: !randomStarter, hostName: myName, isRandom: true});
                        startTurnSequence(randomStarter, oppName, true);
                    }
                }, 1000);
            }
        }

        function resetGameUI() {
            boardState = initialRows.map(count => Array(count).fill(true)); 
            selRow = null; 
            selectedIndices = [];
            document.getElementById('btn-restart').style.display = 'none';
            document.getElementById('btn-move').style.display = 'block';
            document.getElementById('btn-move').disabled = true;
            render();
        }
    </script>
</body>
</html>
