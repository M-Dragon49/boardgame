<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai Cuối Cùng Người Đó Chết</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');
        :root {
            --blue: #3b82f6; --red: #ef4444; --gold: #f59e0b; --green: #10b981; --dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.8); --glass-border: rgba(255, 255, 255, 0.15);
        }
        body {
            font-family: 'Montserrat', sans-serif; background: var(--dark);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc; margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box;
        }
        
        .back-home {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: var(--glass-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); padding: 10px 18px; border-radius: 12px;
            color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 600;
            transition: all 0.3s ease; display: flex; align-items: center; gap: 8px;
        }
        .back-home:hover { color: white; border-color: var(--gold); transform: translateX(5px); }

        .glass {
            background: var(--glass-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 25px; width: 100%; max-width: 500px; margin-top: 50px; box-sizing: border-box;
        }
        h1 { text-align: center; color: var(--gold); text-shadow: 0 2px 10px rgba(0,0,0,0.5); margin-bottom: 25px; text-transform: uppercase; font-size: 1.8rem; }
        input {
            width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.4); color: white; box-sizing: border-box; font-family: inherit; font-size: 15px;
        }
        input:focus { outline: none; border-color: var(--gold); }
        button {
            width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; font-size: 14px;
            cursor: pointer; background: var(--blue); color: white; text-transform: uppercase; margin-bottom: 10px; transition: 0.2s;
        }
        button:hover:not(:disabled) { filter: brightness(1.2); transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-bot { background: #8b5cf6; } 
        
        .row { display: flex; justify-content: center; gap: 12px; margin: 18px 0; }
        .circle {
            width: 48px; height: 48px; background: #1e293b; border: 2px solid #475569;
            border-radius: 50%; cursor: pointer; transition: 0.3s;
        }
        .circle.selected { background: var(--blue); border-color: white; box-shadow: 0 0 20px var(--blue); transform: scale(1.1); }
        .indicator {
            text-align: center; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-weight: 800;
            background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
        }
        .score-box { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: var(--gold); background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px;}
        .player-name { display: block; font-size: 12px; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        .score-num { font-size: 24px; color: white; }
        
        .fullscreen-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.95); z-index: 1000; display: none; 
            flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">⬅ TRANG CHỦ</a>

    <div id="ready-overlay" class="fullscreen-overlay">
        <h2 style="color: var(--gold); font-size: 2rem;">ĐANG CHỜ ĐỐI THỦ...</h2>
        <p id="ready-status" style="color: var(--green); font-size: 1.5rem; font-weight: bold;">Sẵn sàng: 1/2</p>
    </div>

    <div id="randomizing-overlay" class="fullscreen-overlay">
        <h2 id="random-msg" style="color: var(--gold); font-size: 2rem;">Đang tung đồng xu...</h2>
        <p id="random-sub" style="color: #94a3b8;">Ai sẽ đi trước đây?</p>
    </div>

    <div id="lobby" class="glass">
        <h1>AI CUỐI CÙNG<br>NGƯỜI ĐÓ CHẾT</h1>
        <p style="text-align: center; font-size: 13px; color: #94a3b8; margin-bottom: 20px;">Trò chơi chiến thuật lấy viên cuối là THUA</p>
        
        <input type="text" id="my-name-input" placeholder="Bắt buộc nhập tên (Vd: Faker, Chovy...)" maxlength="15">

        <div style="background: rgba(0,0,0,0.4); padding: 20px; border-radius: 16px; border: 1px dashed var(--gold); text-align: center; margin-bottom: 20px;">
            <small style="color: #94a3b8;">ID Phòng Của Bạn:</small>
            <div id="my-id" style="font-size: 22px; font-weight: 800; color: var(--red); letter-spacing: 2px;">...</div>
        </div>
        
        <input type="text" id="peer-id-input" placeholder="Nhập ID phòng đối thủ để tham gia">
        <button onclick="connectToPeer()">BẮT ĐẦU THÁCH ĐẤU ONLINE</button>
        
        <div style="margin: 20px 0; border-top: 1px solid var(--glass-border); padding-top: 20px;"></div>
        
        <button class="btn-bot" onclick="startBotMode()">🤖 CHƠI VỚI MÁY (BOT THÔNG MINH)</button>

        <p id="status" style="text-align:center; font-size: 12px; color: var(--green); margin-top: 15px;">Đang kết nối server...</p>
    </div>

    <div id="game-view" class="glass" style="display:none;">
        <div class="score-box">
            <div style="text-align: left;">
                <span class="player-name" id="name-you">BẠN</span>
                <span class="score-num" id="s-you">0</span>
            </div>
            <div style="text-align: right;">
                <span class="player-name" id="name-opp">ĐỐI THỦ</span>
                <span class="score-num" id="s-opp">0</span>
            </div>
        </div>
        <div id="turn-txt" class="indicator">ĐANG CHỜ...</div>
        <div id="board"></div>
        <button id="btn-move" onclick="makeMove()" disabled style="background: var(--green); margin-top: 25px;">CHỐT LƯỢT ĐI</button>
        <button id="btn-restart" onclick="requestRestart()" style="display:none; background: var(--gold); color:black;">VÁN MỚI (SẴN SÀNG)</button>
    </div>

    <script>
        const peer = new Peer();
        let conn, myId;
        let isHost = false; 
        let isMyTurn = false;
        let isBotMode = false;
        
        let localReady = false;
        let remoteReady = false;
        
        let myName = "";
        let oppName = "Đối Thủ";

        let rows = [3, 4, 7], selRow = null, selCount = 0;
        let scores = {you: 0, opp: 0};

        peer.on('open', id => { 
            myId = id; 
            document.getElementById('my-id').innerText = id; 
            document.getElementById('status').innerText = "Sẵn sàng nhận thách đấu!"; 
        });
        
        // BẢN VÁ LỖI PEERJS: Host chờ Guest kết nối hẳn mới gửi lệnh Start
        peer.on('connection', c => { 
            const inputName = document.getElementById('my-name-input').value.trim();
            if (!inputName) {
                alert("Ai đó đang cố kết nối nhưng bạn chưa nhập tên! Hãy nhập tên để có thể chơi.");
                return;
            }
            
            isHost = true; 
            conn = c; 
            isBotMode = false;
            saveMyName();
            setupConn(); 
            
            const startSequence = () => {
                const randomStarter = Math.random() < 0.5;
                conn.send({type: 'START_INFO', youStart: !randomStarter, hostName: myName});
                startRandomSequence(randomStarter, oppName); 
            };

            // ĐẢM BẢO đường truyền thực sự mở trước khi gửi
            if (conn.open) {
                setTimeout(startSequence, 500);
            } else {
                conn.on('open', () => {
                    setTimeout(startSequence, 500);
                });
            }
        });

        // GUEST KẾT NỐI
        function connectToPeer() {
            const inputName = document.getElementById('my-name-input').value.trim();
            const id = document.getElementById('peer-id-input').value.trim();
            
            if (!inputName) return alert("Vui lòng nhập tên của bạn trước khi bắt đầu!");
            if (!id) return alert("Vui lòng nhập ID phòng của đối thủ!");
            
            isHost = false;
            saveMyName();
            conn = peer.connect(id, { reliable: true });
            isBotMode = false;
            setupConn();
            document.getElementById('status').innerText = "Đang kết nối với đối thủ...";
        }

        function saveMyName() {
            myName = document.getElementById('my-name-input').value.trim();
        }

        function setupConn() {
            // FIX: Gửi tên một cách an toàn
            const sendUserInfo = () => {
                conn.send({type: 'USER_INFO', name: myName});
            };
            
            if (conn.open) { sendUserInfo(); } 
            else { conn.on('open', sendUserInfo); }

            conn.on('data', data => {
                if(data.type === 'USER_INFO') {
                    oppName = data.name;
                    document.getElementById('name-opp').innerText = oppName;
                }
                if(data.type === 'START_INFO') { 
                    oppName = data.hostName; 
                    document.getElementById('name-opp').innerText = oppName;
                    
                    localReady = false; remoteReady = false;
                    document.getElementById('ready-overlay').style.display = 'none';
                    resetGameUI();

                    startRandomSequence(data.youStart, oppName); 
                }
                if(data.type === 'MOVE') { 
                    rows = data.rows; isMyTurn = true; render(); checkWin("OPP"); 
                }
                if(data.type === 'READY_UP') {
                    remoteReady = true;
                    checkBothReady();
                }
                if(data.type === 'RESTART') {
                    // Logic tương thích cũ (nếu có)
                    resetGameUI();
                }
            });
            
            conn.on('close', () => {
                alert("Đối thủ đã ngắt kết nối!");
                window.location.reload();
            });
        }

        // --- LOGIC BOT GIỮ NGUYÊN ---
        function startBotMode() {
            const inputName = document.getElementById('my-name-input').value.trim();
            if (!inputName) return alert("Vui lòng nhập tên của bạn trước khi chơi với máy!");
            
            saveMyName();
            isBotMode = true;
            oppName = "Bot Master 🤖";
            document.getElementById('name-opp').innerText = oppName;
            
            const randomStarter = Math.random() < 0.5;
            startRandomSequence(randomStarter, oppName);
        }

        function executeBotTurn() {
            updateTurnText(false, true); 
            setTimeout(() => {
                let move = getBestBotMove(rows);
                rows[move.row] -= move.take;
                isMyTurn = true;
                render();
                checkWin("OPP");
            }, 1000 + Math.random() * 1000); 
        }

        function getBestBotMove(board) {
            let counts = board.slice();
            let nonOnes = counts.filter(x => x > 1).length;

            if (nonOnes === 1) {
                let ones = counts.filter(x => x === 1).length;
                let targetIndex = counts.findIndex(x => x > 1);
                let leaveAmount = (ones % 2 === 0) ? 1 : 0;
                let takeAmount = counts[targetIndex] - leaveAmount;
                return { row: targetIndex, take: takeAmount };
            }

            let nimSum = counts.reduce((a, b) => a ^ b, 0);
            if (nimSum !== 0) {
                for (let i = 0; i < counts.length; i++) {
                    let target = counts[i] ^ nimSum;
                    if (target < counts[i]) {
                        return { row: i, take: counts[i] - target };
                    }
                }
            }
            let available = counts.map((v, i) => ({v, i})).filter(x => x.v > 0);
            let randRow = available[Math.floor(Math.random() * available.length)];
            return { row: randRow.i, take: 1 };
        }

        // --- GIAO DIỆN & LUỒNG TRÒ CHƠI ---
        function startRandomSequence(iStart, opponentName) {
            const overlay = document.getElementById('randomizing-overlay');
            overlay.style.display = 'flex';
            document.getElementById('name-you').innerText = myName;
            
            setTimeout(() => {
                document.getElementById('random-msg').innerText = iStart ? `${myName.toUpperCase()} ĐI TRƯỚC!` : `${opponentName.toUpperCase()} ĐI TRƯỚC!`;
                document.getElementById('random-msg').style.color = iStart ? "var(--green)" : "var(--red)";
                
                setTimeout(() => {
                    overlay.style.display = 'none';
                    isMyTurn = iStart;
                    startUI();
                    
                    if (isBotMode && !isMyTurn) executeBotTurn();
                }, 1500);
            }, 1500);
        }

        function startUI() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            resetGameUI();
        }

        function render() {
            const b = document.getElementById('board'); b.innerHTML = '';
            rows.forEach((count, rIdx) => {
                const rDiv = document.createElement('div'); rDiv.className = 'row';
                for(let i=0; i<count; i++) {
                    const c = document.createElement('div'); c.className = 'circle';
                    c.onclick = () => select(rIdx, c);
                    rDiv.appendChild(c);
                }
                b.appendChild(rDiv);
            });
            updateTurnText(isMyTurn, false);
        }

        function select(r, el) {
            if(!isMyTurn) return;
            if(selRow !== null && selRow !== r) {
                document.querySelectorAll('.selected').forEach(e => e.classList.remove('selected'));
                selCount = 0;
            }
            el.classList.toggle('selected');
            selRow = r;
            selCount = document.querySelectorAll('.selected').length;
            if(selCount === 0) selRow = null;
            document.getElementById('btn-move').disabled = selCount === 0;
        }

        function makeMove() {
            rows[selRow] -= selCount;
            isMyTurn = false; selRow = null; selCount = 0;
            document.getElementById('btn-move').disabled = true;
            
            if (!isBotMode) conn.send({type: 'MOVE', rows: rows});
            render();
            
            if (!checkWin("YOU") && isBotMode) executeBotTurn();
        }

        function updateTurnText(isMe, isBotThinking = false) {
            const t = document.getElementById('turn-txt');
            if (isMe) {
                t.innerText = "🟢 LƯỢT CỦA BẠN";
                t.style.color = "var(--green)";
            } else {
                t.innerText = isBotThinking ? "🤖 BOT ĐANG TÍNH TOÁN..." : "⏳ ĐỐI THỦ ĐANG NGHĨ...";
                t.style.color = "#94a3b8";
            }
        }

        function checkWin(last) {
            if(rows.reduce((a,b)=>a+b,0) === 0) {
                const winName = (last === "YOU" ? oppName : myName);
                const isYouWin = (winName === myName);
                
                if(isYouWin) scores.you++; else scores.opp++;
                document.getElementById('s-you').innerText = scores.you;
                document.getElementById('s-opp').innerText = scores.opp;
                
                document.getElementById('turn-txt').innerText = `${winName.toUpperCase()} ĐÃ CHIẾN THẮNG!`;
                document.getElementById('turn-txt').style.color = isYouWin ? "var(--green)" : "var(--red)";
                
                document.getElementById('btn-restart').style.display = 'block';
                document.getElementById('btn-move').style.display = 'none';
                return true;
            }
            return false;
        }

        // --- CƠ CHẾ SẴN SÀNG (READY) ---
        function requestRestart() { 
            if (isBotMode) {
                const overlay = document.getElementById('ready-overlay');
                const statusText = document.getElementById('ready-status');
                overlay.style.display = 'flex';
                statusText.innerText = "Sẵn sàng: 2/2\nBắt đầu!";
                statusText.style.color = "var(--green)";
                
                setTimeout(() => {
                    overlay.style.display = 'none';
                    resetGameUI();
                    const randomStarter = Math.random() < 0.5;
                    startRandomSequence(randomStarter, oppName);
                }, 1000);
            } else {
                localReady = true;
                document.getElementById('btn-restart').style.display = 'none'; 
                conn.send({type: 'READY_UP'}); 
                checkBothReady();
            }
        }

        function checkBothReady() {
            const overlay = document.getElementById('ready-overlay');
            const statusText = document.getElementById('ready-status');

            if (localReady && !remoteReady) {
                overlay.style.display = 'flex';
                statusText.innerText = `Sẵn sàng: 1/2\n(Đang chờ ${oppName}...)`;
                statusText.style.color = "var(--gold)";
            } 
            else if (!localReady && remoteReady) {
                document.getElementById('turn-txt').innerText = `${oppName.toUpperCase()} MUỐN CHƠI LẠI (1/2)`;
                document.getElementById('turn-txt').style.color = "var(--gold)";
            } 
            else if (localReady && remoteReady) {
                overlay.style.display = 'flex';
                statusText.innerText = "Sẵn sàng: 2/2\nBắt đầu!";
                statusText.style.color = "var(--green)";

                setTimeout(() => {
                    overlay.style.display = 'none';
                    localReady = false;
                    remoteReady = false;
                    resetGameUI();

                    if (isHost) {
                        const randomStarter = Math.random() < 0.5;
                        conn.send({type: 'START_INFO', youStart: !randomStarter, hostName: myName});
                        startRandomSequence(randomStarter, oppName);
                    }
                }, 1000);
            }
        }

        function resetGameUI() {
            rows = [3, 4, 7]; selRow = null; selCount = 0;
            document.getElementById('btn-restart').style.display = 'none';
            document.getElementById('btn-move').style.display = 'block';
            document.getElementById('btn-move').disabled = true;
            render();
        }
    </script>
</body>
</html>
