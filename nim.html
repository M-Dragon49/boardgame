<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nim Game Online - Dark Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');
        :root {
            --blue: #3b82f6; --red: #ef4444; --gold: #f59e0b; --green: #10b981; --dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.8); --glass-border: rgba(255, 255, 255, 0.15);
        }
        body {
            font-family: 'Montserrat', sans-serif; background: var(--dark);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc; margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .back-home { position: absolute; top: 20px; left: 20px; color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 600; }
        .glass {
            background: var(--glass-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 25px; width: 100%; max-width: 500px; margin-bottom: 20px; box-sizing: border-box;
        }
        h1 { text-align: center; color: var(--gold); text-shadow: 0 2px 10px rgba(0,0,0,0.5); margin: 0 0 20px 0; }
        input {
            width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.4); color: white; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold;
            cursor: pointer; background: var(--blue); color: white; text-transform: uppercase; margin-bottom: 8px;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .row { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .circle {
            width: 45px; height: 45px; background: #1e293b; border: 2px solid #475569;
            border-radius: 50%; cursor: pointer; transition: 0.2s;
        }
        .circle.selected { background: var(--blue); border-color: white; box-shadow: 0 0 15px var(--blue); }
        .circle.removed { visibility: hidden; }
        .indicator {
            text-align: center; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: 800;
            background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
        }
        .score-box { display: flex; justify-content: space-around; margin-bottom: 15px; font-weight: bold; color: var(--gold); }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">⬅ QUAY LẠI</a>

    <div id="lobby" class="glass">
        <h1>NIM ONLINE</h1>
        <p style="text-align: center; font-size: 13px; color: #94a3b8;">Lấy viên cuối cùng sẽ THUA</p>
        <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px dashed var(--gold); text-align: center; margin-bottom: 20px;">
            <small>ID Của Bạn:</small>
            <div id="my-id" style="font-size: 20px; font-weight: 800; color: var(--red);">...</div>
        </div>
        <input type="text" id="peer-id-input" placeholder="Nhập ID đối thủ">
        <button onclick="connectToPeer()">THÁCH ĐẤU</button>
        <p id="status" style="text-align:center; font-size: 12px; color: var(--green);">Đang khởi tạo mạng...</p>
    </div>

    <div id="game-view" class="glass" style="display:none;">
        <div class="score-box">
            <span>BẠN: <span id="s-you">0</span></span>
            <span>ĐỐI THỦ: <span id="s-opp">0</span></span>
        </div>
        <div id="turn-txt" class="indicator">ĐANG CHỜ...</div>
        <div id="board"></div>
        <button id="btn-move" onclick="makeMove()" disabled style="background: var(--green); margin-top: 20px;">XÁC NHẬN ĐI</button>
        <button id="btn-restart" onclick="requestRestart()" style="display:none; background: var(--gold); color:black;">CHƠI LẠI</button>
    </div>

    <script>
        const peer = new Peer();
        let conn, myId, isMyTurn = false;
        let rows = [3, 4, 7], selRow = null, selCount = 0;
        let scores = {you: 0, opp: 0};

        peer.on('open', id => { myId = id; document.getElementById('my-id').innerText = id; document.getElementById('status').innerText = "Sẵn sàng!"; });
        peer.on('connection', c => { conn = c; setupConn(); isMyTurn = true; startUI(); });

        function connectToPeer() {
            const id = document.getElementById('peer-id-input').value;
            if(!id) return;
            conn = peer.connect(id);
            setupConn();
            isMyTurn = false;
            startUI();
        }

        function setupConn() {
            conn.on('data', data => {
                if(data.type === 'MOVE') { rows = data.rows; isMyTurn = true; render(); checkWin("OPP"); }
                if(data.type === 'RESTART') { resetGame(); }
            });
        }

        function startUI() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            resetGame();
        }

        function render() {
            const b = document.getElementById('board'); b.innerHTML = '';
            rows.forEach((count, rIdx) => {
                const rDiv = document.createElement('div'); rDiv.className = 'row';
                for(let i=0; i<count; i++) {
                    const c = document.createElement('div'); c.className = 'circle';
                    c.onclick = () => select(rIdx, c);
                    rDiv.appendChild(c);
                }
                b.appendChild(rDiv);
            });
            updateTurn();
        }

        function select(r, el) {
            if(!isMyTurn) return;
            if(selRow !== null && selRow !== r) return alert("Chỉ chọn trong 1 hàng!");
            el.classList.toggle('selected');
            selRow = r;
            selCount = document.querySelectorAll('.selected').length;
            if(selCount === 0) selRow = null;
            document.getElementById('btn-move').disabled = selCount === 0;
        }

        function makeMove() {
            rows[selRow] -= selCount;
            isMyTurn = false; selRow = null; selCount = 0;
            document.getElementById('btn-move').disabled = true;
            conn.send({type: 'MOVE', rows: rows});
            render();
            checkWin("YOU");
        }

        function updateTurn() {
            const t = document.getElementById('turn-txt');
            t.innerText = isMyTurn ? "🟢 LƯỢT CỦA BẠN" : "⏳ LƯỢT ĐỐI THỦ";
            t.style.color = isMyTurn ? "var(--green)" : "var(--red)";
        }

        function checkWin(last) {
            if(rows.reduce((a,b)=>a+b,0) === 0) {
                const win = (last === "YOU" ? "ĐỐI THỦ" : "BẠN");
                if(win === "BẠN") scores.you++; else scores.opp++;
                document.getElementById('s-you').innerText = scores.you;
                document.getElementById('s-opp').innerText = scores.opp;
                document.getElementById('turn-txt').innerText = win + " THẮNG!";
                document.getElementById('btn-restart').style.display = 'block';
                document.getElementById('btn-move').style.display = 'none';
            }
        }

        function requestRestart() { conn.send({type: 'RESTART'}); resetGame(); }
        function resetGame() {
            rows = [3, 4, 7]; selRow = null; selCount = 0;
            document.getElementById('btn-restart').style.display = 'none';
            document.getElementById('btn-move').style.display = 'block';
            render();
        }
    </script>
</body>
</html>
