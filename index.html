<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Portal - Boardgame Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');
        
        :root {
            --gold: #f59e0b; 
            --dark: #0f172a; 
            --glass-bg: rgba(30, 41, 59, 0.8);
            --glass-border: rgba(255, 255, 255, 0.15);
        }
        
        * {
            box-sizing: border-box; 
        }

        body {
            font-family: 'Montserrat', sans-serif; 
            background: var(--dark);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc; 
            margin: 0; 
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }

        .container { 
            width: 100%; 
            max-width: 800px; 
            text-align: center; 
            padding: 20px; 
        }

        h1 { 
            color: var(--gold); 
            font-size: 2.5rem; 
            margin-bottom: 0.5rem; 
            text-shadow: 0 0 20px rgba(245, 158, 11, 0.3); 
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 25px; 
            margin-top: 40px; 
        }

        .card {
            background: var(--glass-bg); 
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); 
            border-radius: 24px;
            padding: 30px; 
            transition: 0.3s; 
            cursor: pointer; 
            text-decoration: none; 
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover { 
            transform: translateY(-10px); 
            border-color: var(--gold); 
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.1); 
        }

        .icon { 
            font-size: 50px; 
            margin-bottom: 15px; 
        }

        h2 { 
            margin: 10px 0; 
            font-weight: 800; 
            text-transform: uppercase; 
        }

        .btn {
            display: inline-block; 
            margin-top: auto; 
            padding: 12px 30px;
            background: var(--gold); 
            color: black; 
            border-radius: 12px;
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 0.85rem;
        }

        /* Tối ưu cho màn hình Mobile */
        @media (max-width: 600px) {
            .container { padding: 15px; }
            h1 { font-size: 1.8rem; }
            .grid {
                grid-template-columns: 1fr;
                gap: 15px;
                margin-top: 25px;
            }
            .card { padding: 20px; }
            .icon { font-size: 40px; }
            h2 { font-size: 1.2rem; }
            .btn {
                padding: 10px 25px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BOARDGAME HUB</h1>
        <p style="color: #94a3b8;">Hệ thống trò chơi trực tuyến</p>
        <div class="grid">
            <a href="avalon.html" class="card">
                <div class="icon">🏰</div>
                <h2 style="color: #ef4444;">SUY LUẬN</h2>
                <p style="font-size: 0.9rem; color: #cbd5e1;">Trò chơi ẩn vai trò phe Thiện & Ác.</p>
                <div class="btn">Vào Sảnh</div>
            </a>
            
            <a href="nim.html" class="card">
                <div class="icon">🔵</div>
                <h2 style="color: #3b82f6;">CHIẾN THUẬT</h2>
                <p style="font-size: 0.9rem; color: #cbd5e1;">Tính toán toán học - Kẻ lấy cuối cùng là kẻ thua cuộc.</p>
                <div class="btn">Thách Đấu</div>
            </a>

            <a href="count.html" class="card">
                <div class="icon">🎯</div>
                <h2 style="color: #10b981;">ĐẾM SỐ CHIẾN LƯỢC</h2>
                <p style="font-size: 0.9rem; color: #cbd5e1;">Trò chơi đếm số - Ai đạt đến số mục tiêu trước người đó sẽ giành chiến thắng!</p>
                <div class="btn">Chơi Ngay</div>
            </a>
        </div>
    </div>
</body>
</html>
